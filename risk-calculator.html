<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Risk Calculator - PaulyFx</title>
  <style>
    :root {
        --primary: #00ffcc;
        --dark: #0a0a0a;
        --card: #111111;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: 'Segoe UI', system-ui, sans-serif;
        background: var(--dark);
        color: #e0e0e0;
        line-height: 1.6;
    }
    nav {
        position: fixed;
        top: 0; width: 100%;
        background: rgba(10,10,10,0.95);
        backdrop-filter: blur(10px);
        padding: 18px 5%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #222;
        z-index: 1000;
    }
    .logo { 
        font-size: 1.65rem; 
        font-weight: 800; 
        color: var(--primary); 
    }

    .container {
        max-width: 700px;
        margin: 100px auto 50px;
        padding: 0 20px;
    }
    h1 {
        text-align: center;
        font-size: 2.8rem;
        margin-bottom: 15px;
        color: var(--primary);
    }
    .subtitle {
        text-align: center;
        opacity: 0.8;
        margin-bottom: 50px;
    }
    .card {
        background: var(--card);
        border-radius: 24px;
        padding: 45px 40px;
    }
    label {
        display: block;
        margin: 20px 0 8px;
        font-weight: 600;
    }
    input {
        width: 100%;
        padding: 14px;
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 12px;
        color: white;
        font-size: 1.1rem;
    }
    .result {
        margin-top: 35px;
        padding: 25px;
        background: #1a1a1a;
        border-radius: 16px;
        border: 2px solid var(--primary);
        text-align: center;
        display: none;
    }
    button {
        width: 100%;
        padding: 18px;
        background: linear-gradient(45deg, #00ffcc, #00ccff);
        color: black;
        border: none;
        border-radius: 50px;
        font-size: 1.25rem;
        font-weight: 700;
        margin-top: 30px;
        cursor: pointer;
    }
    .back-btn {
        display: inline-block;
        margin-top: 40px;
        color: var(--primary);
        text-decoration: none;
    }
  </style>
</head>
<body>

  <nav>
    <div class="logo">PaulyFx</div>
  </nav>

  <div class="container">
    <h1>Risk Calculator</h1>
    <p class="subtitle">Calculate your safe position size in seconds</p>

    <div class="card">
      <label>Account Balance ($)</label>
      <input type="number" id="balance" placeholder="e.g. 10000" value="10000">

      <label>Risk % per Trade</label>
      <input type="number" id="riskPercent" step="0.1" placeholder="e.g. 1" value="1">

      <label>Stop Loss Distance (in points / pips / ticks)</label>
      <input type="number" id="stopLoss" placeholder="e.g. 50" value="50">

      <label>Contract / Lot Size Value (per point)</label>
      <input type="number" id="pipValue" placeholder="e.g. 10 (for 1 standard lot forex)" value="10">

      <button onclick="calculateRisk()">Calculate Position Size</button>

      <div id="result" class="result"></div>
    </div>

    <a href="index.html" class="back-btn">← Back to Home</a>
  </div>

  <script>
    function calculateRisk() {
      const balance = parseFloat(document.getElementById('balance').value);
      const riskPercent = parseFloat(document.getElementById('riskPercent').value);
      const stopLoss = parseFloat(document.getElementById('stopLoss').value);
      const pipValue = parseFloat(document.getElementById('pipValue').value);

      if (!balance || !riskPercent || !stopLoss || !pipValue) {
        alert("Please fill in all fields");
        return;
      }

      const riskAmount = (balance * riskPercent) / 100;
      const positionSize = riskAmount / (stopLoss * pipValue);

      const resultDiv = document.getElementById('result');
      resultDiv.style.display = "block";
      resultDiv.innerHTML = `
        <h2 style="color: var(--primary);">Recommended Position Size</h2>
        <p style="font-size: 2.2rem; margin: 15px 0; color: #00ffcc;">
          <strong>${positionSize.toFixed(2)}</strong> lots / units
        </p>
        <p style="margin: 15px 0;">
          You are risking <strong>$${riskAmount.toFixed(2)}</strong> on this trade
        </p>
        <p style="opacity: 0.8; font-size: 1rem;">
          Always respect your risk rules. 1 Trade a Day mindset starts with proper risk management.
        </p>
      `;
    }
  </script>
</body>
</html>
