<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pre-Trade Mindset Checker - PaulyFx</title>
  <style>
    :root {
        --primary: #00ffcc;
        --dark: #0a0a0a;
        --card: #111111;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: 'Segoe UI', system-ui, sans-serif;
        background: var(--dark);
        color: #e0e0e0;
        line-height: 1.6;
    }
    nav {
        position: fixed;
        top: 0; width: 100%;
        background: rgba(10,10,10,0.95);
        backdrop-filter: blur(10px);
        padding: 18px 5%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #222;
        z-index: 1000;
    }
    .logo { font-size: 1.65rem; font-weight: 800; color: var(--primary); }

    .container {
        max-width: 820px;
        margin: 100px auto 50px;
        padding: 0 20px;
    }
    h1 {
        text-align: center;
        font-size: 2.8rem;
        margin-bottom: 15px;
        color: var(--primary);
    }
    .subtitle {
        text-align: center;
        opacity: 0.8;
        margin-bottom: 50px;
    }
    .card {
        background: var(--card);
        border-radius: 20px;
        padding: 40px;
        margin-bottom: 30px;
    }
    label {
        display: block;
        margin: 22px 0 10px;
        font-weight: 600;
        font-size: 1.05rem;
    }
    select {
        width: 100%;
        padding: 14px;
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 12px;
        color: white;
        font-size: 1rem;
    }
    button {
        width: 100%;
        padding: 18px;
        background: linear-gradient(45deg, #00ffcc, #00ccff);
        color: black;
        border: none;
        border-radius: 50px;
        font-size: 1.25rem;
        font-weight: 700;
        margin-top: 40px;
        cursor: pointer;
        transition: 0.3s;
    }
    button:hover {
        transform: translateY(-3px);
    }
    #result {
        margin-top: 40px;
        padding: 30px;
        border-radius: 20px;
        display: none;
        text-align: center;
    }
    .back-btn {
        display: inline-block;
        margin-top: 50px;
        color: var(--primary);
        text-decoration: none;
        font-size: 1.1rem;
    }
  </style>
</head>
<body>

  <nav>
    <div class="logo">PaulyFx</div>
  </nav>

  <div class="container">
    <h1>Pre-Trade Mindset Checker</h1>
    <p class="subtitle">Be honest. This tool helps you avoid emotional trading.</p>

    <div class="card">
      <label>1. How do you feel emotionally right now?</label>
      <select id="emotion">
        <option value="4">Calm & Focused</option>
        <option value="3">Slightly excited / motivated</option>
        <option value="2">Tired or distracted</option>
        <option value="1">Frustrated, angry or FOMO</option>
        <option value="0">Very emotional / Revenge mode</option>
      </select>

      <label>2. Did you have any losing trades recently?</label>
      <select id="lastTrades">
        <option value="3">No, last trades were good or neutral</option>
        <option value="2">Small losses, but handled well</option>
        <option value="1">Big loss(es) and still thinking about it</option>
        <option value="0">I'm on a losing streak</option>
      </select>

      <label>3. How confident are you in your edge today?</label>
      <select id="confidence">
        <option value="3">Very confident, clear setup in mind</option>
        <option value="2">Moderately confident</option>
        <option value="1">Not sure, forcing trades</option>
        <option value="0">No real edge, just want to trade</option>
      </select>

      <label>4. What is your planned risk for today?</label>
      <select id="risk">
        <option value="3">1% or less</option>
        <option value="2">1.5% – 2%</option>
        <option value="1">Over 2%</option>
        <option value="0">No plan / All-in mode</option>
      </select>

      <label>5. Are you trading according to your rules or chasing?</label>
      <select id="rules">
        <option value="3">Strictly following my rules</option>
        <option value="2">Mostly following, but a bit flexible</option>
        <option value="1">Bending the rules a little</option>
        <option value="0">Just feeling the market / chasing</option>
      </select>

      <button onclick="checkMindset()">Check My Trading Readiness</button>
    </div>

    <div id="result"></div>

    <a href="index.html" class="back-btn">← Back to Home</a>
  </div>

  <script>
    function checkMindset() {
      const emotion = parseInt(document.getElementById('emotion').value);
      const lastTrades = parseInt(document.getElementById('lastTrades').value);
      const confidence = parseInt(document.getElementById('confidence').value);
      const risk = parseInt(document.getElementById('risk').value);
      const rules = parseInt(document.getElementById('rules').value);

      const totalScore = emotion + lastTrades + confidence + risk + rules;
      const maxScore = 15;
      const percentage = Math.round((totalScore / maxScore) * 100);

      let title = "";
      let message = "";
      let color = "";

      if (totalScore >= 12) {
        title = "✅ Excellent - You're Ready";
        message = "Your mindset looks strong. Stick to your plan, be patient, and trust your process. Good luck!";
        color = "#00ffcc";
      } 
      else if (totalScore >= 9) {
        title = "⚠️ Caution - Proceed Carefully";
        message = "You're in an okay state, but be extra disciplined today. Consider reducing your risk size and only take A+ setups.";
        color = "#ffcc00";
      } 
      else {
        title = "⛔ Not Recommended to Trade";
        message = "Your current emotional state or lack of clarity increases the chance of poor decisions. Better to sit out today and reset.";
        color = "#ff6666";
      }

      document.getElementById('result').innerHTML = `
        <div style="background:#1a1a1a; padding:35px; border-radius:20px; border: 3px solid ${color};">
          <h2 style="color:${color}; margin-bottom:15px;">${title}</h2>
          <p style="font-size:1.4rem; margin:20px 0;">Score: <strong>${totalScore}/${maxScore}</strong> (${percentage}%)</p>
          <p style="font-size:1.15rem; line-height:1.7;">${message}</p>
          <p style="margin-top:25px; opacity:0.75;">Remember: Protecting your capital starts with protecting your mindset.</p>
        </div>
      `;
      document.getElementById('result').style.display = "block";
    }
  </script>
</body>
</html>
