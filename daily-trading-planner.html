<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Trading Planner - PaulyFx</title>
  <style>
    :root {
        --primary: #00ffcc;
        --dark: #0a0a0a;
        --card: #111111;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: 'Segoe UI', system-ui, sans-serif;
        background: var(--dark);
        color: #e0e0e0;
        line-height: 1.6;
    }
    nav {
        position: fixed;
        top: 0; width: 100%;
        background: rgba(10,10,10,0.95);
        backdrop-filter: blur(10px);
        padding: 18px 5%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #222;
        z-index: 1000;
    }
    .logo { 
        font-size: 1.65rem; 
        font-weight: 800; 
        color: var(--primary); 
    }

    .container {
        max-width: 850px;
        margin: 100px auto 50px;
        padding: 0 20px;
    }
    h1 {
        text-align: center;
        font-size: 2.8rem;
        margin-bottom: 15px;
        color: var(--primary);
    }
    .subtitle {
        text-align: center;
        opacity: 0.8;
        margin-bottom: 50px;
    }
    .card {
        background: var(--card);
        border-radius: 24px;
        padding: 45px 40px;
    }
    label {
        display: block;
        margin: 20px 0 8px;
        font-weight: 600;
    }
    input[type="text"], textarea, select {
        width: 100%;
        padding: 14px;
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 12px;
        color: white;
        font-size: 1.05rem;
    }
    textarea {
        min-height: 130px;
        resize: vertical;
    }
    .btn {
        width: 100%;
        padding: 18px;
        background: linear-gradient(45deg, #00ffcc, #00ccff);
        color: black;
        border: none;
        border-radius: 50px;
        font-size: 1.25rem;
        font-weight: 700;
        margin-top: 35px;
        cursor: pointer;
        transition: all 0.3s;
    }
    .btn:hover {
        transform: translateY(-4px);
        box-shadow: 0 12px 30px rgba(0, 255, 204, 0.4);
    }
  </style>
</head>
<body>

  <nav>
    <div class="logo">PaulyFx</div>
  </nav>

  <div class="container">
    <h1>Daily Trading Planner</h1>
    <p class="subtitle">Plan your one high-quality trade before the session begins</p>

    <div class="card">
      <label>Date</label>
      <input type="text" id="date" placeholder="2026.04.06">

      <label>Instrument / Pair</label>
      <input type="text" id="pair" placeholder="EURUSD, NAS100, BTC...">

      <label>Market Bias</label>
      <select id="bias">
        <option value="">Select Bias</option>
        <option value="Bullish">Bullish</option>
        <option value="Bearish">Bearish</option>
        <option value="Ranging">Ranging / Sideways</option>
      </select>

      <label>Setup Type</label>
      <input type="text" id="setup" placeholder="Break & Retest, Pullback, Order Block, Fair Value Gap...">

      <label>Entry Level</label>
      <input type="text" id="entry" placeholder="e.g. 1.0850">

      <label>Stop Loss</label>
      <input type="text" id="sl" placeholder="e.g. 1.0820">

      <label>Take Profit Target(s)</label>
      <input type="text" id="tp" placeholder="e.g. 1.0920 | 1.0980">

      <label>Risk:Reward Ratio</label>
      <input type="text" id="rr" placeholder="e.g. 1:2.8">

      <label>Why do I have an edge today?</label>
      <textarea id="edge" placeholder="Explain your reasoning for this setup..."></textarea>

      <button onclick="downloadPlanner()" class="btn">Download Today's Setup Plan</button>
    </div>

    <a href="index.html" style="display:block; text-align:center; margin-top:50px; color:var(--primary);">
      ← Back to Home
    </a>
  </div>

  <script>
    function downloadPlanner() {
      const date = document.getElementById('date').value || "No date";
      const pair = document.getElementById('pair').value || "No pair";
      const bias = document.getElementById('bias').value || "No bias";
      const setup = document.getElementById('setup').value || "";
      const entry = document.getElementById('entry').value || "";
      const sl = document.getElementById('sl').value || "";
      const tp = document.getElementById('tp').value || "";
      const rr = document.getElementById('rr').value || "";
      const edge = document.getElementById('edge').value || "";

      const content = `PaulyFx - Daily Trading Planner
============================

Date: ${date}
Instrument: ${pair}
Bias: ${bias}

Setup Type: ${setup}
Entry Level: ${entry}
Stop Loss: ${sl}
Take Profit: ${tp}
Risk:Reward Ratio: ${rr}

Why I have an edge today:
${edge}

============================
Saved on: ${new Date().toLocaleString()}
`;

      const blob = new Blob([content], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `Setup_Plan_${date.replace(/\./g, '-')}.txt`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      alert("✅ Setup Plan successfully downloaded!");
    }

    // Automatikus dátum kitöltése
    window.onload = () => {
      const today = new Date().toLocaleDateString('en-GB');
      document.getElementById('date').value = today;
    };
  </script>
</body>
</html>
