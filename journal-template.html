<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trading Journal - PaulyFx</title>
  <style>
    :root {
        --primary: #00ffcc;
        --dark: #0a0a0a;
        --card: #111111;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: 'Segoe UI', system-ui, sans-serif;
        background: var(--dark);
        color: #e0e0e0;
        line-height: 1.6;
    }
    nav {
        position: fixed;
        top: 0; width: 100%;
        background: rgba(10,10,10,0.95);
        backdrop-filter: blur(10px);
        padding: 18px 5%;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid #222;
        z-index: 1000;
    }
    .logo { font-size: 1.65rem; font-weight: 800; color: var(--primary); }

    .container {
        max-width: 900px;
        margin: 100px auto 50px;
        padding: 0 20px;
    }
    h1 {
        text-align: center;
        font-size: 2.8rem;
        margin-bottom: 10px;
        color: var(--primary);
    }
    .subtitle {
        text-align: center;
        opacity: 0.8;
        margin-bottom: 40px;
    }
    .journal-card {
        background: var(--card);
        border-radius: 20px;
        padding: 40px;
    }
    .section-title {
        color: var(--primary);
        margin: 30px 0 12px;
        font-size: 1.4rem;
    }
    label {
        display: block;
        margin: 15px 0 6px;
        font-weight: 500;
    }
    input[type="text"], textarea {
        width: 100%;
        padding: 12px;
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 10px;
        color: white;
        font-size: 1rem;
    }
    textarea {
        min-height: 110px;
        resize: vertical;
    }
    .checklist {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin: 20px 0;
    }
    .check-item {
        display: flex;
        align-items: center;
        gap: 10px;
    }
    .btn {
        width: 100%;
        padding: 16px;
        background: linear-gradient(45deg, #00ffcc, #00ccff);
        color: black;
        border: none;
        border-radius: 50px;
        font-size: 1.2rem;
        font-weight: 700;
        margin-top: 25px;
        cursor: pointer;
    }
    .btn-secondary {
        background: transparent;
        border: 2px solid var(--primary);
        color: var(--primary);
        margin-top: 15px;
    }
  </style>
</head>
<body>

  <nav>
    <div class="logo">PaulyFx</div>
  </nav>

  <div class="container">
    <h1>Trading Journal</h1>
    <p class="subtitle">Track your mindset, rules, and lessons from every session</p>

    <div class="journal-card">
      <h2 class="section-title">Session Info</h2>
      <label>Date</label>
      <input type="text" id="date" placeholder="2026.04.06">

      <label>Instrument / Pair</label>
      <input type="text" id="pair" placeholder="EURUSD, NAS100, BTC...">

      <h2 class="section-title">Pre-Trade Mindset</h2>
      <div class="checklist">
        <div class="check-item"><input type="checkbox" id="c1"> Calm & Focused</div>
        <div class="check-item"><input type="checkbox" id="c2"> Following my rules</div>
        <div class="check-item"><input type="checkbox" id="c3"> No FOMO / Revenge</div>
        <div class="check-item"><input type="checkbox" id="c4"> Risk under control</div>
        <div class="check-item"><input type="checkbox" id="c5"> Patient</div>
        <div class="check-item"><input type="checkbox" id="c6"> Clear edge</div>
      </div>

      <h2 class="section-title">Trade Details</h2>
      <label>Entry Reason (Setup)</label>
      <textarea id="entry" placeholder="Why did you take this trade?"></textarea>

      <label>Result (P/L in R)</label>
      <input type="text" id="result" placeholder="+1.8R  /  -0.6R">

      <label>What did I do well?</label>
      <textarea id="good" placeholder="Positive points..."></textarea>

      <label>What can I improve next time?</label>
      <textarea id="improve" placeholder="Lessons learned..."></textarea>

      <button onclick="downloadJournal()">Download Journal Entry</button>
      <button onclick="clearForm()" class="btn btn-secondary">Clear Form</button>
    </div>

    <a href="index.html" style="display:block; text-align:center; margin-top:40px; color:var(--primary);">
      ← Back to Home
    </a>
  </div>

  <script>
    function downloadJournal() {
      const date = document.getElementById('date').value || "No date";
      const pair = document.getElementById('pair').value || "No pair";
      const entry = document.getElementById('entry').value || "";
      const result = document.getElementById('result').value || "";
      const good = document.getElementById('good').value || "";
      const improve = document.getElementById('improve').value || "";

      let checklist = "";
      if (document.getElementById('c1').checked) checklist += "✓ Calm & Focused\n";
      if (document.getElementById('c2').checked) checklist += "✓ Following my rules\n";
      if (document.getElementById('c3').checked) checklist += "✓ No FOMO / Revenge\n";
      if (document.getElementById('c4').checked) checklist += "✓ Risk under control\n";
      if (document.getElementById('c5').checked) checklist += "✓ Patient\n";
      if (document.getElementById('c6').checked) checklist += "✓ Clear edge\n";

      const content = `PaulyFx Trading Journal
============================

Date: ${date}
Instrument: ${pair}

Pre-Trade Mindset:
${checklist || "No checklist items selected"}

Entry Reason:
${entry}

Result:
${result}

What I did well:
${good}

What I can improve:
${improve}

============================
Saved on: ${new Date().toLocaleString()}
`;

      const blob = new Blob([content], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `Trading_Journal_${date.replace(/\./g, '-')}.txt`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      alert("✅ Journal saved and downloaded successfully!");
    }

    function clearForm() {
      if (confirm("Clear the entire form?")) {
        document.querySelectorAll('input, textarea').forEach(el => el.value = '');
        document.querySelectorAll('input[type="checkbox"]').forEach(el => el.checked = false);
      }
    }

    // Dátum automatikus kitöltése
    window.onload = () => {
      const today = new Date().toLocaleDateString('en-GB');
      document.getElementById('date').value = today;
    };
  </script>
</body>
</html>
